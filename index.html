<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux AI — Premium Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0b0f;
            color: #e8e8e8;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: #0f0f14;
            border-right: 1px solid #1e1e26;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 16px 12px;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0 20px 4px;
            border-bottom: 1px solid #1a1a22;
        }

        .sidebar-header .logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .sidebar-header .logo i {
            margin-right: 8px;
            color: #aaa;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px 16px;
            margin: 16px 0 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #2a2a36;
            border-radius: 12px;
            color: #d0d0d8;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
        }

        .new-chat-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #3a3a4a;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            margin-top: 4px;
        }

        .chat-list::-webkit-scrollbar {
            width: 3px;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: #2a2a36;
            border-radius: 10px;
        }

        .chat-item {
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            color: #a0a0b0;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2px;
            border: 1px solid transparent;
        }

        .chat-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #d0d0e0;
        }

        .chat-item.active {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            border-color: #2a2a3a;
        }

        .chat-item i {
            font-size: 14px;
            color: #5a5a6a;
            width: 18px;
        }

        .chat-item .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-item .chat-delete {
            opacity: 0;
            transition: 0.2s;
            color: #555;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }

        .chat-item:hover .chat-delete {
            opacity: 1;
        }

        .chat-item .chat-delete:hover {
            color: #ff4444;
        }

        .sidebar-footer {
            padding-top: 16px;
            border-top: 1px solid #1a1a22;
            font-size: 12px;
            color: #4a4a5a;
            text-align: center;
        }

        /* ===== MAIN CHAT ===== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0e0e12;
            height: 100vh;
            min-width: 0;
        }

        .chat-header {
            padding: 16px 28px;
            border-bottom: 1px solid #1a1a22;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: #0e0e12;
        }

        .chat-header .title {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .title .badge {
            font-size: 10px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 12px;
            border-radius: 20px;
            color: #888;
            border: 1px solid #222;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #666;
        }

        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status .dot.online {
            background: #888;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.05);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .status .dot.offline {
            background: #2a2a3a;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }

        .msg {
            display: flex;
            gap: 14px;
            padding: 14px 0;
            animation: fadeSlide 0.4s ease;
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        @keyframes fadeSlide {
            0% {
                opacity: 0;
                transform: translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg .avatar {
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #aaa;
        }

        .msg.user .avatar {
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
        }

        .msg .bubble {
            max-width: 74%;
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #d8d8e0;
        }

        .msg.user .bubble {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        .msg .bubble img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .msg .bubble .loading {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 200px;
        }

        .msg .bubble .loading .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top: 2px solid #888;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .msg .bubble .loading .progress-text {
            font-size: 13px;
            color: #888;
            animation: pulse-text 1.5s ease-in-out infinite;
        }

        .msg .bubble .loading .status-steps {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 4px;
            font-size: 12px;
            color: #555;
        }

        .msg .bubble .loading .status-steps .step {
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.5;
            transition: 0.3s;
        }

        .msg .bubble .loading .status-steps .step.active {
            opacity: 1;
            color: #aaa;
        }

        .msg .bubble .loading .status-steps .step i {
            font-size: 12px;
            width: 16px;
        }

        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .msg .bubble .error {
            color: #666;
        }

        /* Input */
        .input-area {
            padding: 16px 28px 24px;
            border-top: 1px solid #1a1a22;
            flex-shrink: 0;
            background: #0e0e12;
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 4px 6px 4px 18px;
            transition: border 0.25s, box-shadow 0.25s;
            max-width: 900px;
            margin: 0 auto;
        }

        .input-wrapper:focus-within {
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.02);
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: #e8e8e8;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 48px;
            max-height: 160px;
            line-height: 1.5;
        }

        .input-wrapper textarea::placeholder {
            color: #444;
        }

        .input-wrapper .btn-send {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #aaa;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
            transition: 0.25s;
            white-space: nowrap;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .input-wrapper .btn-send:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .input-wrapper .btn-send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-wrapper .btn-send i {
            font-size: 13px;
        }

        .footer-hint {
            text-align: center;
            font-size: 11px;
            color: #333;
            padding: 8px 0 0;
            max-width: 900px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            .messages {
                padding: 16px 16px 4px;
            }
            .input-area {
                padding: 12px 16px 18px;
            }
            .msg .bubble {
                max-width: 90%;
            }
        }

        @media (max-width: 480px) {
            .msg .bubble {
                font-size: 14px;
                padding: 10px 14px;
            }
            .msg .avatar {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .input-wrapper .btn-send span {
                display: none;
            }
            .input-wrapper .btn-send {
                padding: 8px 14px;
            }
            .chat-header .title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="logo"><i class="fas fa-wand-magic-sparkles"></i>Flux AI</div>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i> Новый чат
        </button>
        <div class="chat-list" id="chatList">
            <!-- чаты будут добавляться сюда -->
        </div>
        <div class="sidebar-footer">
            <span>⚡ локально</span>
        </div>
    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">
        <div class="chat-header">
            <div class="title">
                <i class="fas fa-comment" style="color:#666;"></i>
                <span id="chatTitle">Новый чат</span>
                <span class="badge">FLUX</span>
            </div>
            <div class="status">
                <span class="dot offline" id="statusDot"></span>
                <span id="statusText">Offline</span>
            </div>
        </div>

        <div class="messages" id="chatBox">
            <div class="msg assistant">
                <div class="avatar"><i class="fas fa-robot"></i></div>
                <div class="bubble">
                    <strong>Привет.</strong> Я <span style="color:#aaa;">Flux AI</span>.<br />
                    Напиши промпт на русском или английском — я создам фотореалистичную картинку.
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="promptInput" rows="1" placeholder="Опиши, что сгенерировать… (Enter → отправить)"></textarea>
                <button class="btn-send" id="sendBtn">
                    <i class="fas fa-arrow-right"></i>
                    <span>Отправить</span>
                </button>
            </div>
            <div class="footer-hint">
                <span>⚡</span> Генерация 20–60 секунд
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  КОНФИГУРАЦИЯ
        // ============================================================
        const COMFYUI_URL = 'https://wretchedly-competent-lynx.cloudpub.ru/';

        // ============================================================
        //  DOM
        // ============================================================
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('promptInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const chatList = document.getElementById('chatList');
        const chatTitle = document.getElementById('chatTitle');
        const newChatBtn = document.getElementById('newChatBtn');

        let isGenerating = false;
        let currentChatId = Date.now();
        let chats = JSON.parse(localStorage.getItem('flux_chats') || '[]');

        // ============================================================
        //  СТАТУСЫ ДЛЯ ПРОГРЕССА (как в ChatGPT)
        // ============================================================
        const statusMessages = [
            '🎨 Генерирую изображение...',
            '✨ Доделываю штрихи...',
            '🖌️ Добавляю детали...',
            '🌈 Завершаю обработку...',
            '✅ Почти готово!'
        ];

        // ============================================================
        //  РАБОТА С ЧАТАМИ
        // ============================================================
        function saveChats() {
            localStorage.setItem('flux_chats', JSON.stringify(chats));
        }

        function renderChatList() {
            chatList.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                div.innerHTML = `
                    <i class="fas fa-comment"></i>
                    <span class="chat-title">${chat.title || 'Новый чат'}</span>
                    <button class="chat-delete" data-id="${chat.id}"><i class="fas fa-times"></i></button>
                `;
                div.addEventListener('click', () => switchChat(chat.id));
                const del = div.querySelector('.chat-delete');
                del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteChat(chat.id);
                });
                chatList.appendChild(div);
            });
        }

        function switchChat(id) {
            currentChatId = id;
            const chat = chats.find(c => c.id === id);
            if (chat) {
                chatTitle.textContent = chat.title || 'Новый чат';
                chatBox.innerHTML = chat.messages || '';
                renderChatList();
            }
        }

        function deleteChat(id) {
            chats = chats.filter(c => c.id !== id);
            if (chats.length === 0) {
                createNewChat();
            } else {
                if (currentChatId === id) {
                    switchChat(chats[0].id);
                }
            }
            saveChats();
            renderChatList();
        }

        function createNewChat() {
            const newChat = {
                id: Date.now(),
                title: 'Новый чат',
                messages: `
                    <div class="msg assistant">
                        <div class="avatar"><i class="fas fa-robot"></i></div>
                        <div class="bubble">
                            <strong>Привет.</strong> Я <span style="color:#aaa;">Flux AI</span>.<br />
                            Напиши промпт на русском или английском — я создам фотореалистичную картинку.
                        </div>
                    </div>
                `
            };
            chats.unshift(newChat);
            currentChatId = newChat.id;
            saveChats();
            renderChatList();
            chatBox.innerHTML = newChat.messages;
            chatTitle.textContent = 'Новый чат';
        }

        function updateCurrentChat() {
            const chat = chats.find(c => c.id === currentChatId);
            if (chat) {
                chat.messages = chatBox.innerHTML;
                const userMsg = chatBox.querySelector('.msg.user .bubble');
                if (userMsg && chat.title === 'Новый чат') {
                    chat.title = userMsg.textContent.slice(0, 30) + (userMsg.textContent.length > 30 ? '...' : '');
                    chatTitle.textContent = chat.title;
                }
                saveChats();
                renderChatList();
            }
        }

        // ============================================================
        //  СТАТУС
        // ============================================================
        async function checkStatus() {
            try {
                const res = await fetch(`${COMFYUI_URL}/system_stats`);
                if (res.ok) {
                    statusDot.className = 'dot online';
                    statusText.textContent = 'Онлайн';
                } else {
                    throw new Error('offline');
                }
            } catch {
                statusDot.className = 'dot offline';
                statusText.textContent = 'Офлайн';
            }
        }

        // ============================================================
        //  СООБЩЕНИЯ
        // ============================================================
        function addMessage(role, content, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            if (imageUrl) {
                bubble.innerHTML = `<img src="${imageUrl}" loading="lazy" />`;
            } else {
                bubble.textContent = content;
            }
            div.appendChild(avatar);
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            updateCurrentChat();
            return bubble;
        }

        // ============================================================
        //  ПРОГРЕСС-БАР
        // ============================================================
        function showLoading() {
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.id = 'loadingMsg';
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="progress-text" id="progressText">⏳ Подготавливаю запрос...</div>
                    <div class="status-steps" id="statusSteps">
                        ${statusMessages.map((msg, i) => `
                            <div class="step" data-step="${i}">
                                <i class="fas fa-circle" style="font-size: 6px;"></i>
                                <span>${msg}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            div.appendChild(avatar);
            div.appendChild(bubble);
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Запускаем анимацию смены статусов
            let currentStep = 0;
            const steps = document.querySelectorAll('.step');
            const progressText = document.getElementById('progressText');

            const interval = setInterval(() => {
                if (currentStep < steps.length) {
                    steps.forEach((step, index) => {
                        step.classList.toggle('active', index === currentStep);
                    });
                    progressText.textContent = statusMessages[currentStep] || '⏳ Генерирую...';
                    currentStep++;
                } else {
                    clearInterval(interval);
                }
            }, 5000);

            // Сохраняем interval для очистки
            div._interval = interval;

            return div;
        }

        function removeLoading() {
            const el = document.getElementById('loadingMsg');
            if (el) {
                if (el._interval) clearInterval(el._interval);
                el.remove();
            }
        }

        // ============================================================
        //  ГЕНЕРАЦИЯ
        // ============================================================
        async function generateImage(prompt) {
            if (isGenerating || !prompt.trim()) return;
            isGenerating = true;
            sendBtn.disabled = true;
            input.disabled = true;

            addMessage('user', prompt);
            showLoading();

            try {
                const workflow = {
                    "1": {
                        "class_type": "KSampler",
                        "inputs": {
                            "model": ["16", 0],
                            "positive": ["8", 0],
                            "negative": ["7", 0],
                            "latent_image": ["9", 0],
                            "seed": 123456789,
                            "steps": 15,
                            "cfg": 1,
                            "sampler_name": "euler",
                            "scheduler": "sgm_uniform",
                            "denoise": 1
                        }
                    },
                    "2": {
                        "class_type": "VAEDecode",
                        "inputs": {
                            "samples": ["1", 0],
                            "vae": ["6", 0]
                        }
                    },
                    "3": {
                        "class_type": "SaveImage",
                        "inputs": {
                            "images": ["2", 0],
                            "filename_prefix": "FLUX_output"
                        }
                    },
                    "6": {
                        "class_type": "VAELoader",
                        "inputs": {
                            "vae_name": "ae.safetensors"
                        }
                    },
                    "7": {
                        "class_type": "CLIPTextEncode",
                        "inputs": {
                            "text": "blurry, low quality, cartoon, ugly",
                            "clip": ["15", 0]
                        }
                    },
                    "8": {
                        "class_type": "CLIPTextEncode",
                        "inputs": {
                            "text": prompt,
                            "clip": ["15", 0]
                        }
                    },
                    "9": {
                        "class_type": "EmptyLatentImage",
                        "inputs": {
                            "width": 512,
                            "height": 512,
                            "batch_size": 1
                        }
                    },
                    "15": {
                        "class_type": "CLIPLoader",
                        "inputs": {
                            "clip_name": "t5xxl_fp8_e4m3fn.safetensors",
                            "type": "sd3",
                            "device": "default"
                        }
                    },
                    "16": {
                        "class_type": "UnetLoaderGGUF",
                        "inputs": {
                            "unet_name": "colossusProjectFluxGGUF_v50.gguf"
                        }
                    }
                };

                const payload = { "prompt": workflow };

                const res = await fetch(`${COMFYUI_URL}/prompt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorText = await res.text();
                    throw new Error(`Ошибка ${res.status}: ${errorText}`);
                }

                const data = await res.json();
                const promptId = data.prompt_id;

                let imageUrl = null;
                for (let i = 0; i < 60; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    const historyRes = await fetch(`${COMFYUI_URL}/history/${promptId}`);
                    const history = await historyRes.json();

                    if (history[promptId]?.outputs) {
                        const outputs = history[promptId].outputs;
                        for (const nodeId in outputs) {
                            const img = outputs[nodeId]?.images?.[0];
                            if (img) {
                                imageUrl = `${COMFYUI_URL}/view?filename=${img.filename}&subfolder=${img.subfolder}&type=${img.type}`;
                                break;
                            }
                        }
                        if (imageUrl) break;
                    }
                }

                removeLoading();
                if (imageUrl) {
                    addMessage('assistant', '✅ Готово.', imageUrl);
                } else {
                    throw new Error('Не удалось получить изображение');
                }
            } catch (err) {
                removeLoading();
                const bubble = addMessage('assistant', '❌ Ошибка: ' + err.message);
                bubble.classList.add('error');
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
            }
        }

        // ============================================================
        //  СОБЫТИЯ
        // ============================================================
        sendBtn.addEventListener('click', () => {
            const val = input.value.trim();
            if (val) {
                input.value = '';
                generateImage(val);
            }
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const val = input.value.trim();
                if (val) {
                    input.value = '';
                    generateImage(val);
                }
            }
        });

        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 160) + 'px';
        });

        newChatBtn.addEventListener('click', createNewChat);

        // ============================================================
        //  ПЕРЕВОД НА РУССКИЙ (для промптов)
        // ============================================================
        // Модель понимает английский лучше, но мы будем отправлять
        // пользовательский промпт как есть — она справится с русским.

        // ============================================================
        //  СТАРТ
        // ============================================================
        if (chats.length === 0) {
            createNewChat();
        } else {
            renderChatList();
            switchChat(chats[0].id);
        }

        checkStatus();
        setInterval(checkStatus, 15000);
        console.log('🖤 Flux AI Chat запущен!');
    </script>

</body>
</html>
